<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>实人认证</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --brand:    #f7235e;
    --warn-red: #ff3366;
    --badge-bg: #ffe7f0;
    --badge-fg: #f7235e;
    --ink:      #1a1a1a;
    --label:    #8c8c8c;
    --line:     #eee;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue",
                "Microsoft YaHei",sans-serif;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    background:#f0f0f0; display:flex; justify-content:center; min-height:100vh;
  }
  .phone{
    width:100%; max-width:420px; background:#fff; position:relative;
    display:flex; flex-direction:column; min-height:100vh; overflow:hidden;
  }

  .navbar{
    background:var(--brand); color:#fff; height:52px;
    display:flex; align-items:center; justify-content:center;
    position:sticky; top:0; z-index:30;
    font-size:17px; font-weight:500; letter-spacing:2px;
  }
  .navbar .back{ position:absolute; left:16px; font-size:26px; line-height:1; font-weight:400; }

  .content{
    position:relative; flex:1; padding:22px 18px 30px; overflow:hidden;
  }
  .watermark{
    position:fixed; top:52px; bottom:0;
    left:50%; transform:translateX(-50%);
    width:100%; max-width:420px;
    pointer-events:none; z-index:50;
    background-image:url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' width='132' height='70'>\
<text x='2' y='52' font-size='11' fill='rgba(0,0,0,0.085)' \
font-family='sans-serif' transform='rotate(-24 2 52)'>仅用于大麦实人认证</text></svg>");
    background-repeat:repeat;
  }

  .notice{ text-align:center; line-height:1.65; position:relative; z-index:6; }
  .notice .black{ color:var(--ink); font-size:17px; font-weight:600; }
  .notice .red{ color:var(--warn-red); font-weight:600; margin-top:5px; }
  .notice .red.lg{ font-size:16px; }
  .notice .red.sm{ font-size:15px; }

  .qr-wrap{ margin:20px auto 0; width:48%; max-width:200px; position:relative; z-index:6; }
  .qr-card{
    background:#f7f7f7; border-radius:0; padding:9px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; position:relative; min-height:auto;
  }
  #qrcode{ width:100%; line-height:0; }
  #qrcode img, #qrcode canvas{
    display:block; width:100%; height:auto; background:#fff; padding:7px;
    border:1px dashed #d6d6d6; image-rendering:pixelated;
  }
  .uploaded{ width:100%; height:auto; aspect-ratio:1; object-fit:contain; background:#fff; padding:7px; border:1px dashed #d6d6d6; }

  /* 旋转锥形渐变光带：两端为径向直线 → 落在方框上形成“斜边” */
  .runner{
    position:absolute; inset:0; border-radius:0; overflow:hidden;
    pointer-events:none; padding:4px;            /* 光带粗细（变细） */
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;                  /* Safari/WebKit */
            mask-composite:exclude;              /* 标准 */
  }
  .runner-spin{
    position:absolute; left:50%; top:50%;
    width:170%; height:170%;
    transform:translate(-50%,-50%) rotate(0deg);
    transform-origin:center;
    /* 渐变弧段约 80°：蓝→紫→品红，硬边形成斜切端头 */
    background:conic-gradient(from 0deg,
      transparent 0 268deg,
      #3a6df0 271deg, #7b2ff7 312deg, #ff2e44 348deg,
      transparent 351deg 360deg);
    animation:spin 5s linear infinite;           /* 5s 一圈，较慢 */
  }
  @keyframes spin{ to{ transform:translate(-50%,-50%) rotate(360deg); } }
  @media (prefers-reduced-motion: reduce){ .runner-spin{ animation:none; } }

  .selfie{
    margin:18px auto 0; width:calc(48% - 18px); max-width:182px; aspect-ratio:1;
    border-radius:0; overflow:hidden;
    position:relative; z-index:6; cursor:pointer;
    background:linear-gradient(135deg,#d9d4cb,#c4beb3);
    display:flex; align-items:center; justify-content:center;
  }
  .selfie img.photo{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }
  .selfie .avatar{
    width:108px; height:108px; border-radius:50%; background:rgba(255,255,255,.35);
    display:flex; align-items:center; justify-content:center;
  }
  .selfie .avatar svg{ width:70px; height:70px; fill:#7a7568; }

  .info{ margin:24px -18px 0; position:relative; z-index:6; border-top:1px solid var(--line); }
  .info .row{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 18px; border-bottom:1px solid var(--line); min-height:auto;
  }
  .info .label{ font-size:12px; color:var(--label); display:flex; align-items:center; gap:7px; }
  .eye{ width:17px; height:17px; fill:#8c8c8c; cursor:pointer; }
  .info .value{ display:flex; align-items:center; gap:8px; font-size:12.5px; color:var(--ink); }
  .editable{ cursor:pointer; }
  .editable:active{ opacity:.55; }
  .badge{
    display:inline-flex; align-items:center; gap:4px;
    background:var(--badge-bg); color:var(--badge-fg);
    font-size:10.5px; font-weight:600; padding:3px 8px; border-radius:20px;
  }
  .badge svg{ width:11px; height:11px; fill:var(--badge-fg); }
  .time{ color:#8c8c8c; font-size:11.5px; }

  .visits{ position:absolute; bottom:26px; left:0; right:0;
           text-align:center; font-size:11.5px; color:#bbb; letter-spacing:.3px; }

  input[type=file]{ display:none; }

  /* 密码访问门 */
  .gate{
    position:fixed; inset:0; z-index:100;
    background:#fff; display:flex; flex-direction:column; align-items:center;
    padding:0 32px; justify-content:center;
  }
  .gate .lock{
    width:64px; height:64px; border-radius:50%; background:var(--badge-bg);
    display:flex; align-items:center; justify-content:center; margin-bottom:22px;
  }
  .gate .lock svg{ width:32px; height:32px; fill:var(--brand); }
  .gate h2{ margin:0 0 6px; font-size:19px; font-weight:600; color:var(--ink); }
  .gate p{ margin:0 0 28px; font-size:13px; color:#999; }
  .gate .field{ width:100%; max-width:300px; }
  .gate input{
    width:100%; height:48px; border:1px solid #e2e2e2; border-radius:10px;
    padding:0 16px; font-size:16px; outline:none; text-align:center; letter-spacing:4px;
    -webkit-font-smoothing:antialiased;
  }
  .gate input:focus{ border-color:var(--brand); }
  .gate .err{ color:var(--warn-red); font-size:13px; height:18px; margin:8px 0 0; text-align:center; }
  .gate button{
    width:100%; max-width:300px; height:48px; margin-top:8px;
    background:var(--brand); color:#fff; border:none; border-radius:10px;
    font-size:16px; font-weight:600; cursor:pointer; letter-spacing:1px;
  }
  .gate button:active{ opacity:.85; }
  .shake{ animation:shake .35s; }
  @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
</style>
</head>
<body>
  <!-- 密码访问门（注意：纯前端校验，仅用于原型演示，非真实安全防护） -->
  <div class="gate" id="gate">
    <div class="lock">
      <svg viewBox="0 0 24 24"><path d="M12 1a5 5 0 0 0-5 5v3H6a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2h-1V6a5 5 0 0 0-5-5zm0 2a3 3 0 0 1 3 3v3H9V6a3 3 0 0 1 3-3zm0 11a2 2 0 0 1 1 3.7V19a1 1 0 0 1-2 0v-1.3A2 2 0 0 1 12 14z"/></svg>
    </div>
    <h2>请输入访问密码</h2>
    <p>本页面需要密码才能访问</p>
    <div class="field">
      <input id="pwd" type="password" inputmode="numeric" placeholder="••••••"
             onkeydown="if(event.key==='Enter')checkPwd()" />
      <div class="err" id="pwdErr"></div>
    </div>
    <button onclick="checkPwd()">进入</button>

    <!-- 密码正确次数（Abacus 计数 API，纯静态无需后端，全站累计） -->
    <div class="visits" id="okCounter">
      总计被使用 <span id="okCount">···</span> 次
    </div>
  </div>

  <div class="phone">

    <div class="navbar"><span class="back">‹</span>实人认证</div>

    <div class="content">

      <div class="notice">
        <div class="black">此码非购票凭证，仅用于身份信息核验</div>
        <div class="red lg">仅限本人使用，请勿发送他人</div>
        <div class="red sm">认证当日有效，过期请重新认证；仅最新认证生效</div>
      </div>

      <div class="qr-wrap">
        <div class="qr-card" onclick="qrInput.click()">
          <div id="qrcode"></div>
          <div class="runner"><div class="runner-spin"></div></div>
        </div>
      </div>
      <input type="file" id="qrInput" accept="image/*" />

      <div class="selfie" onclick="photoInput.click()">
        <img class="photo" id="photoImg" alt="本人照片" />
        <div class="avatar" id="avatarPlaceholder">
          <svg viewBox="0 0 24 24"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10zm0 2c-5 0-9 2.5-9 6v2h18v-2c0-3.5-4-6-9-6z"/></svg>
        </div>
      </div>
      <input type="file" id="photoInput" accept="image/*" />

      <div class="info">
        <div class="row">
          <span class="label">
            姓名
            <svg class="eye" id="eyeIcon" viewBox="0 0 24 24" onclick="toggleReveal(event)"></svg>
          </span>
          <span class="value">
            <span class="badge">
              <svg viewBox="0 0 24 24"><path d="M12 1 3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4zm-1.2 14.2-3.5-3.5 1.4-1.4 2.1 2.1 4.9-4.9 1.4 1.4-6.3 6.3z"/></svg>
              已实名
            </span>
            <span class="editable" id="nameVal" data-real="某某某" onclick="editName()"></span>
          </span>
        </div>
        <div class="row">
          <span class="label">证件号码</span>
          <span class="value editable" id="idVal" data-real="110000200001011234" onclick="editId()"></span>
        </div>
        <div class="row">
          <span class="label">查询时间</span>
          <span class="value time" id="queryTime">--</span>
        </div>
      </div>
    </div>

  </div>

  <!-- 水印放在 .phone 之外、直接挂在 body 下，避免被 overflow:hidden 裁剪，确保 fixed 真正生效 -->
  <div class="watermark"></div>

<script>
  /* 密码访问门（纯前端，仅原型演示用）
     规则：当前小时(两位) + 88 + 当前分钟(两位)，例如 14:31 → 148831
     容许前后 1 分钟误差（含跨小时） */
  function pwdFor(d){
    const p=n=>String(n).padStart(2,"0");
    return p(d.getHours())+"88"+p(d.getMinutes());
  }

  /* 密码正确次数计数（Abacus 计数 API，无需后端，全站累计）
     注意：计数是公开的，任何知道下面 key 的人都能读/加；仅适合非敏感的展示用途 */
  const COUNT_NS  = "damaiticket.github.io";   // 命名空间，建议用你的域名
  const COUNT_KEY = "pwd_correct";             // 计数项名称
  function showCount(v){ document.getElementById("okCount").textContent = v; }
  // 加载时只读取当前值显示（不增加）
  fetch(`https://abacus.jasoncameron.dev/get/${COUNT_NS}/${COUNT_KEY}`)
    .then(r=>r.ok?r.json():{value:0}).then(d=>showCount(d.value??0)).catch(()=>showCount(0));
  // 密码正确时 +1
  function bumpCount(){
    fetch(`https://abacus.jasoncameron.dev/hit/${COUNT_NS}/${COUNT_KEY}`)
      .then(r=>r.json()).then(d=>showCount(d.value)).catch(()=>{});
  }

  function checkPwd(){
    const el=document.getElementById("pwd");
    const v=el.value.trim();
    const now=Date.now();
    const ok=[-60000,0,60000].some(off=>pwdFor(new Date(now+off))===v);
    if(ok){
      bumpCount();
      document.getElementById("gate").style.display="none";
    }else{
      const err=document.getElementById("pwdErr");
      err.textContent="密码错误，请重试";
      el.value=""; el.classList.remove("shake"); void el.offsetWidth; el.classList.add("shake");
      el.focus();
    }
  }
  window.addEventListener("load",()=>document.getElementById("pwd").focus());

  /* 二维码演示码 */
  new QRCode(document.getElementById("qrcode"), {
    text:"https://mev.maitix.com/verify?token=DEMO_"+Date.now(),
    width:168, height:168, colorDark:"#000", colorLight:"#fff",
    correctLevel: QRCode.CorrectLevel.M
  });

  /* 本地图片预览 */
  function readImage(file, cb){
    if(!file || !file.type.startsWith("image/")) return;
    const r=new FileReader(); r.onload=e=>cb(e.target.result); r.readAsDataURL(file);
  }
  qrInput.addEventListener("change",e=>readImage(e.target.files[0],url=>{
    document.getElementById("qrcode").innerHTML='<img class="uploaded" src="'+url+'">';
    // 只允许上传一次：移除点击、禁用文件选择
    const card=document.querySelector(".qr-card");
    card.onclick=null; card.style.cursor="default"; qrInput.disabled=true;
  }));
  photoInput.addEventListener("change",e=>readImage(e.target.files[0],url=>{
    const img=document.getElementById("photoImg");
    img.src=url; img.style.display="block";
    document.getElementById("avatarPlaceholder").style.display="none";
    // 只允许上传一次：移除点击、禁用文件选择
    const sf=document.querySelector(".selfie");
    sf.onclick=null; sf.style.cursor="default"; photoInput.disabled=true;
  }));

  /* 眼睛图标 */
  const EYE_OPEN  = '<path d="M12 5C5 5 1 12 1 12s4 7 11 7 11-7 11-7-4-7-11-7zm0 11a4 4 0 110-8 4 4 0 010 8z"/>';
  const EYE_CLOSE = '<path d="M12 6c-5 0-9 4-10 6 .4.8 1.4 2.3 3 3.6L3.5 23l1 1L21 4.5l-1-1-2.6 2.6C16 6.4 14.1 6 12 6zm0 3c.4 0 .8.1 1.1.2l-2.9 2.9C10.1 10.4 11 9 12 9zm8 .4-2 2c.1.5.1 1 .1 1.6 0 2.2-1.8 4-4 4-.3 0-.6 0-.9-.1l-1.5 1.5c.8.1 1.6.1 2.4.1 5 0 9-4 10-6-.5-1-1.8-2.6-3.6-4z"/>';

  /* 显示/隐藏：默认隐藏。点小眼睛同时控制 姓名 + 证件号码 */
  let revealed = false;
  function maskName(real){ return "*" + real.slice(1); }            // 姓氏脱敏
  function maskId(real){
    return real.length>=6 ? real.slice(0,3)+"*".repeat(real.length-6)+real.slice(-3) : real;
  }
  function renderFields(){
    const nameEl=document.getElementById("nameVal");
    const idEl=document.getElementById("idVal");
    const n=nameEl.dataset.real, id=idEl.dataset.real;
    nameEl.textContent = revealed ? n  : maskName(n);
    idEl.textContent   = revealed ? id : maskId(id);
    document.getElementById("eyeIcon").innerHTML = revealed ? EYE_OPEN : EYE_CLOSE;
  }
  function toggleReveal(e){ e.stopPropagation(); revealed=!revealed; renderFields(); }

  function editName(){
    const el=document.getElementById("nameVal");
    const v=prompt("请输入姓名", el.dataset.real);
    if(v){ el.dataset.real=v; renderFields(); }
  }
  function editId(){
    const el=document.getElementById("idVal");
    const v=prompt("请输入证件号码", el.dataset.real);
    if(v){ el.dataset.real=v; renderFields(); }
  }

  /* 查询时间自动填充 */
  (function(){
    const d=new Date(), p=n=>String(n).padStart(2,"0");
    document.getElementById("queryTime").textContent =
      d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate())+" "+
      p(d.getHours())+":"+p(d.getMinutes())+":"+p(d.getSeconds());
  })();

  renderFields();
</script>
</body>
</html>
